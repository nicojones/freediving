name: Deploy Fishly

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check for dependency changes
        id: changed-deps
        uses: tj-actions/changed-files@v42
        with:
          files: |
            package.json
            package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run unit tests
        run: npm run test:run

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Build Next.js
        run: npm run build

      - name: Prepare Deployment Packages
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          cp start_freediving.sh .next/standalone/
          mkdir -p .next/standalone/src
          cp -r src/data .next/standalone/src/
          cd .next/standalone && zip -r ../../build.zip . && cd ../..

      - name: Upload build to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build.zip"
          target: "/var/www/freediving"

      - name: Post-deployment on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/freediving

            if [ -f "build.zip" ]; then
              unzip -o -q build.zip
              rm build.zip
            fi

            systemctl restart freediving.service
