<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#1b343b",
              "on-error": "#690005",
              "secondary": "#ffd799",
              "primary": "#52dad3",
              "on-surface-variant": "#c0c7cd",
              "secondary-fixed": "#ffdeac",
              "surface-dim": "#0d1416",
              "surface-variant": "#2f3638",
              "tertiary": "#b0cbd3",
              "on-tertiary-container": "#9db7bf",
              "primary-fixed-dim": "#52dad3",
              "on-secondary": "#432c00",
              "on-primary-fixed-variant": "#00504d",
              "error-container": "#93000a",
              "surface-tint": "#52dad3",
              "on-secondary-fixed": "#281900",
              "on-error-container": "#ffdad6",
              "inverse-on-surface": "#2a3234",
              "primary-container": "#004e4b",
              "secondary-container": "#feb300",
              "tertiary-container": "#304950",
              "on-tertiary-fixed-variant": "#324a51",
              "surface-container-low": "#161d1f",
              "on-tertiary-fixed": "#041f25",
              "surface-container": "#1a2123",
              "inverse-surface": "#dde4e6",
              "secondary-fixed-dim": "#ffba38",
              "on-primary": "#003735",
              "error": "#ffb4ab",
              "background": "#0d1416",
              "surface-bright": "#333a3d",
              "surface-container-lowest": "#080f11",
              "inverse-primary": "#006a66",
              "on-primary-container": "#36c6bf",
              "outline": "#8a9297",
              "tertiary-fixed-dim": "#b0cbd3",
              "on-background": "#dde4e6",
              "on-secondary-container": "#6a4800",
              "outline-variant": "#40484c",
              "on-surface": "#dde4e6",
              "surface-container-highest": "#2f3638",
              "on-secondary-fixed-variant": "#604100",
              "surface": "#0d1416",
              "surface-container-high": "#242b2d",
              "tertiary-fixed": "#cce7f0",
              "primary-fixed": "#73f7ef",
              "on-primary-fixed": "#00201e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .abyssal-gradient {
            background: radial-gradient(circle at top, #1a2426 0%, #0d1416 100%);
        }
        .glass-panel {
            background: rgba(47, 54, 56, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .primary-pulse-gradient {
            background: linear-gradient(135deg, #52dad3 0%, #004e4b 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center justify-center overflow-hidden selection:bg-primary selection:text-on-primary">
<!-- Atmospheric Background -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 abyssal-gradient"></div>
<div class="absolute top-[-10%] left-[-10%] w-[120%] h-[120%] opacity-20 bg-[url('image-depth-texture')] bg-cover" data-alt="Subtle dark ocean water texture with light rays"></div>
<div class="absolute bottom-0 left-0 right-0 h-64 bg-gradient-to-t from-background to-transparent"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-10 flex flex-col items-center">
<!-- Header / Identity -->
<header class="mb-20 text-center flex flex-col items-center">
<div class="mb-6 flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 text-primary border border-primary/20">
<span class="material-symbols-outlined text-4xl" data-icon="waves">waves</span>
</div>
<h1 class="font-headline text-[3.5rem] font-bold tracking-tight text-primary leading-none mb-2">Submerged</h1>
<p class="font-label text-on-surface-variant tracking-[0.2em] uppercase text-[0.65rem] font-medium">Breathhold Protocol</p>
</header>
<!-- Login Form -->
<section class="w-full space-y-8">
<div class="space-y-6">
<!-- Username Field -->
<div class="group">
<label class="block font-label text-on-surface-variant text-[0.7rem] uppercase tracking-widest mb-3 ml-1" for="username">Username</label>
<div class="relative flex items-center bg-surface-container-low rounded-xl transition-all duration-400 focus-within:bg-surface-container-high border border-transparent focus-within:border-primary/20">
<span class="material-symbols-outlined absolute left-5 text-on-surface-variant group-focus-within:text-primary transition-colors duration-400" data-icon="person">person</span>
<input class="w-full bg-transparent border-none py-5 pl-14 pr-6 focus:ring-0 text-on-surface placeholder:text-outline-variant font-body" id="username" placeholder="Diver Identifier" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block font-label text-on-surface-variant text-[0.7rem] uppercase tracking-widest mb-3 ml-1" for="password">Password</label>
<div class="relative flex items-center bg-surface-container-low rounded-xl transition-all duration-400 focus-within:bg-surface-container-high border border-transparent focus-within:border-primary/20">
<span class="material-symbols-outlined absolute left-5 text-on-surface-variant group-focus-within:text-primary transition-colors duration-400" data-icon="key">key</span>
<input class="w-full bg-transparent border-none py-5 pl-14 pr-6 focus:ring-0 text-on-surface placeholder:text-outline-variant font-body" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full primary-pulse-gradient h-[5.5rem] rounded-xl flex items-center justify-center gap-3 transition-all duration-400 active:scale-95 group overflow-hidden relative shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
<span class="font-headline font-bold text-on-primary text-xl tracking-wide relative z-10">Start Training</span>
<span class="material-symbols-outlined text-on-primary relative z-10 transition-transform duration-400 group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
<!-- Subtle glow overlay on hover -->
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-400"></div>
</button>
</section>
<!-- Footer / Technical Information (Suppressed Reg/Sign-up as per instructions) -->
<footer class="mt-24 text-center">
<p class="font-label text-on-surface-variant/40 text-[0.6rem] uppercase tracking-widest">
                Version 2.0.4 • Deep Flow Encrypted
            </p>
</footer>
</main>
<!-- Aesthetic Corner Accents -->
<div class="fixed top-20 right-20 w-32 h-32 rounded-full bg-primary/5 blur-3xl pointer-events-none"></div>
<div class="fixed bottom-40 left-10 w-48 h-48 rounded-full bg-secondary/5 blur-3xl pointer-events-none"></div>
</body></html>
